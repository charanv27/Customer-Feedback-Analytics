<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer Feedback Analytics using NLP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>

<body>
  <div class="page-bg">
    <div class="container py-5">
      <div class="mx-auto" style="max-width: 900px;">

        <div class="text-center mb-4">
          <h1 class="display-6 fw-semibold mb-2">Customer Feedback Analytics using NLP</h1>
          <p class="lead text-muted mb-3">
            Upload a file and instantly get Sentiment, Keywords, Named Entities, and a Summary.
          </p>
          <span class="badge rounded-pill bg-dark-subtle text-dark border px-3 py-2">
            TXT • PDF • DOCX • CSV
          </span>
        </div>

        <div class="card shadow-lg card-glass">
          <div class="card-body p-4 p-md-5">
            <form method="POST" action="/analyze" enctype="multipart/form-data">
              <label class="form-label fw-semibold">Upload a file to analyze</label>

              <input
                class="form-control form-control-lg"
                type="file"
                name="file"
                accept=".txt,.pdf,.docx,.csv"
                required
              >

              <div class="d-flex flex-wrap gap-2 mt-3">
                <button class="btn btn-primary btn-lg px-4" type="submit">Analyze File</button>
              </div>

              <div class="mt-3 small text-muted">
                Supported formats: TXT, PDF, DOCX, CSV
              </div>
            </form>
          </div>
        </div>

        <div class="text-center mt-4 small text-muted">
          Built with Flask + spaCy + TF-IDF + VADER + BERT.
        </div>

      </div>
    </div>
  </div>
</body>
</html>
